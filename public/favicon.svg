<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#emerald)" stroke-width="12" stroke-opacity="0.3"/>
  <g filter="url(#glow)">
    <path d="M 170 170 L 100 256 L 170 342" fill="none" stroke="url(#emerald)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 342 170 L 412 256 L 342 342" fill="none" stroke="url(#emerald)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="280" y1="150" x2="232" y2="362" stroke="url(#emerald)" stroke-width="36" stroke-linecap="round"/>
  </g>
</svg>
